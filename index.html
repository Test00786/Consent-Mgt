        <div id="toast"></div>
      </div> 
      <div class="full-width-footer-border"></div>
      <div class="button-group" id="button-group">
          <button class="cancel" id="cancelBtn" style="display: none;">Cancel</button>
          <button class="submit" id="submitBtn" style="display: none;">Submit</button>
      </div>
    
  </div>
  <script>
    // Configuration options for the consent widget
    window.consentWidgetConfig = {

      submitApiUrl: "https://starhealth.pre-dataprivacy.com/cpm-api/open-api/v1/consent/v1/createOrUpdateConsent",
      tenantToken: "Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJjMDE0NTczNi01MmIyLTRkMjEtOTQ2My0zZDI2NTQyMDQzZjciLCJwcm9kdWN0IjoiQ29uc2VudCBNYW5hZ21lbnQiLCJzY29wZSI6ImFjY2VzcyIsImlhdCI6MTc4Mjg4MjMzNiwiZXhwIjoxNzgyOTY4NzM2fQ.t2fch_BfatPCVes6K11nx6HYGD1XhRHQall7lXQ4-AU",
      signatureServiceUrl: "https://starhealth.pre-dataprivacy.com/cpm-sign",
      dataPrincipalId: [
        {
          key: "email",
          value: "release2@yopmail.com"
        }
      ],
      customAttributes: {
        "ticketID": "",
        "registration ID": ""
      },
      showButtons: true,
      showLanguageDropdown: true,
      enableCheckboxes: true,
      enableRadioButtons: true,
      enableDropdowns: true,
      receivedType:"WEB"
    };

  // Function for Android WebView integration to dynamically set tenant token and data principal ID
  // Called from Android native code before loading the consent widget
  window.updateConsentConfig = function(token, dataPrincipalId) {
      if (token) {
        window.consentWidgetConfig.tenantToken = token;
      }

      if (dataPrincipalId) {
        window.consentWidgetConfig.dataPrincipalId = dataPrincipalId;
      }

      // Dynamically load script.js only once to prevent multiple script injections
      if (!window.scriptLoaded) {
        const script = document.createElement('script');
        script.src = 'script.js';
        // SRI (Subresource Integrity) ensures script hasn't been tampered with
        // Replace HASH_VALUE_HERE with actual SHA-384 hash of script.js
        // Generate hash: openssl dgst -sha384 -binary script.js | openssl base64 -A
        script.integrity = 'sha384-HASH_VALUE_HERE';
        // crossOrigin required for SRI validation
        script.crossOrigin = 'anonymous';
        script.integrity = "sha384-YQ1aasibiEptXTSlcG+e4cc++qi9rbKGk3pFrePnwj6X7c3/H5IA+z8iw7te9AEO";
        script.onload = function() {
          window.scriptLoaded = true;
          console.log("script.js loaded");
        };
        document.body.appendChild(script);
      }

      return "Config updated successfully";
    };
  </script>
  

<!--
  Optional: Use custom buttons if the parent application
  wants to control Consent Form submission and reset actions.

  Note:
  - Set `showButtons: false` in the widget configuration.
  - Submit button calls `consentWidget.submit()`.
  - Clear button calls `consentWidget.reset()`.
-->
