<!DOCTYPE html>

<title>Consent Widget</title>
<link href="styles.css" rel="stylesheet"/>
<style>
.user-info{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:20px;}
.user-field{display:flex;flex-direction:column;}
.user-field label{font-weight:600;margin-bottom:6px;}
.user-field input{padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;}
@media(max-width:768px){.user-info{grid-template-columns:1fr;}}

<body>

<div class="header-language-wrapper-container">

<div class="dropdown">
<label for="langSelect">Language Preference <br/></label>
<select id="langSelect"></select>
</div>
</div>
</div>
<div class="header-container">
<div class="logo-area" id="logo-area"></div>
</div><div class="user-info"><div class="user-field"><label for="firstName">First Name</label><input id="firstName" name="firstName" placeholder="First Name" type="text"/></div><div class="user-field"><label for="lastName">Last Name</label><input id="lastName" name="lastName" placeholder="Last Name" type="text"/></div><div class="user-field"><label for="mobile">Mobile Number</label><input id="mobile" name="mobile" placeholder="Mobile Number" type="text"/></div><div class="user-field"><label for="email">Email ID</label><input id="email" name="email" placeholder="Email ID" type="text"/></div></div>
<div class="preview-statements">
<div id="consent-root">Loading consent form...</div>
<div class="error-message" id="error-message"></div>
<div id="toast"></div>
</div>
<div class="full-width-footer-border"></div>
<div class="button-group" id="button-group">
<button class="cancel" id="cancelBtn" style="display: none;">Cancel</button>
<button class="submit" id="submitBtn" style="display: none;">Submit</button>
</div>
</div>

    };

  // Function for Android WebView integration to dynamically set tenant token and data principal ID
  // Called from Android native code before loading the consent widget
  window.updateConsentConfig = function(token, dataPrincipalId) {
      if (token) {
        window.consentWidgetConfig.tenantToken = token;
      }

      if (dataPrincipalId) {
        window.consentWidgetConfig.dataPrincipalId = dataPrincipalId;
      }

      // Dynamically load script.js only once to prevent multiple script injections
      if (!window.scriptLoaded) {
        const script = document.createElement('script');
        script.src = 'script.js';
        // SRI (Subresource Integrity) ensures script hasn't been tampered with
        // Replace HASH_VALUE_HERE with actual SHA-384 hash of script.js
        // Generate hash: openssl dgst -sha384 -binary script.js | openssl base64 -A
        script.integrity = 'sha384-HASH_VALUE_HERE';
        // crossOrigin required for SRI validation
        script.crossOrigin = 'anonymous';
        script.integrity = "sha384-YQ1aasibiEptXTSlcG+e4cc++qi9rbKGk3pFrePnwj6X7c3/H5IA+z8iw7te9AEO";
        script.onload = function() {
          window.scriptLoaded = true;
          console.log("script.js loaded");
        };
        document.body.appendChild(script);
      }

      return "Config updated successfully";
    };
  </script>
